<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#212121] text-gray-100 font-sans flex h-screen overflow-hidden">

    <!-- Main Chat Workspace -->
    <div class="flex-1 flex flex-col h-full relative">
        <header class="border-b border-[#3c3d3e] px-6 py-4 flex items-center justify-between bg-[#2f2f2f]">
            <h1 class="text-lg font-semibold tracking-wide">Agentic Workspace</h1>
            <span class="text-xs px-2 py-1 bg-green-950 text-green-400 border border-green-800 rounded-full">Documents Active</span>
        </header>

        <!-- Messages Container -->
        <div id="chat-feed" class="flex-1 overflow-y-auto px-4 py-6 md:px-24 space-y-6">
            <div class="flex items-start gap-4 max-w-3xl mx-auto">
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold shrink-0 text-sm">A</div>
                <div class="bg-[#2f2f2f] rounded-2xl px-4 py-3 shadow-md max-w-[85%] border border-[#3c3d3e]">
                    <p class="text-sm leading-relaxed">Hello! I can now read documents as well. Feel free to upload **PDFs, Word files (.docx), or CSVs** using the attachment button below!</p>
                </div>
            </div>
        </div>

        <!-- Input Area Footer -->
        <footer class="p-4 md:px-24 border-t border-[#3c3d3e] bg-[#212121]">
            <div class="max-w-3xl mx-auto flex flex-col gap-2">
                
                <!-- File Attachment Chips Area -->
                <div id="file-chips-container" class="flex flex-wrap gap-2 px-2"></div>

                <!-- Input box -->
                <div class="flex items-center bg-[#2f2f2f] rounded-2xl border border-[#3c3d3e] shadow-lg overflow-hidden px-4 py-3">
                    
                    <!-- File input element hidden -->
                    <input type="file" id="file-input" multiple accept=".pdf,.docx,.csv" class="hidden" onchange="handleFileSelection()" />
                    
                    <!-- Clip icon -->
                    <button onclick="document.getElementById('file-input').click()" class="mr-3 text-gray-400 hover:text-gray-200 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13" />
                        </svg>
                    </button>

                    <textarea id="user-input" rows="1" placeholder="Type query or instructions..." class="flex-1 bg-transparent border-0 outline-none focus:ring-0 text-sm resize-none text-gray-100 placeholder-gray-500 max-h-32" onkeydown="checkSubmit(event)"></textarea>
                    
                    <button onclick="sendMessage()" class="ml-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-xs font-semibold tracking-wide transition-all duration-200 shadow-md">
                        Send
                    </button>
                </div>
                <div class="text-[10px] text-gray-500 text-center">Multi-Modal Agent • Phase 2 Uploads Active</div>
            </div>
        </footer>
    </div>

    <!-- Right Sidebar -->
    <div class="w-80 border-l border-[#3c3d3e] bg-[#171717] flex flex-col h-full shrink-0">
        <div class="px-4 py-4 border-b border-[#3c3d3e]">
            <h2 class="text-sm font-semibold tracking-wide text-gray-300">Agent Reasoning Logs</h2>
        </div>
        <div id="log-feed" class="flex-1 overflow-y-auto p-4 space-y-4 text-xs font-mono text-gray-400">
            <div class="italic text-gray-600">Waiting for requests...</div>
        </div>
    </div>

    <script>
        const chatFeed = document.getElementById('chat-feed');
        const userInput = document.getElementById('user-input');
        const logFeed = document.getElementById('log-feed');
        const fileInput = document.getElementById('file-input');
        const fileChipsContainer = document.getElementById('file-chips-container');
        
        let chatHistory = [];
        let stagedFiles = [];

        function handleFileSelection() {
            const files = Array.from(fileInput.files);
            files.forEach(file => {
                // Prevent duplicate staging
                if (!stagedFiles.some(f => f.name === file.name)) {
                    stagedFiles.push(file);
                }
            });
            renderFileChips();
        }

        function removeFile(index) {
            stagedFiles.splice(index, 1);
            renderFileChips();
        }

        function renderFileChips() {
            fileChipsContainer.innerHTML = '';
            stagedFiles.forEach((file, index) => {
                const chip = document.createElement('div');
                chip.className = 'flex items-center gap-1.5 bg-[#3a3a3c] text-xs text-gray-200 px-3 py-1.5 rounded-full border border-[#4d4d4f]';
                chip.innerHTML = `
                    <span class="max-w-[150px] truncate">${file.name}</span>
                    <button onclick="removeFile(${index})" class="text-gray-400 hover:text-red-400 font-bold ml-1">×</button>
                `;
                fileChipsContainer.appendChild(chip);
            });
        }

        function checkSubmit(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function appendMessage(role, content) {
            const isUser = role === 'user';
            const initial = isUser ? 'U' : 'A';
            const bubbleBg = isUser ? 'bg-[#3a3a3c] border-transparent' : 'bg-[#2f2f2f] border-[#3c3d3e]';
            const avatarBg = isUser ? 'bg-teal-600' : 'bg-indigo-600';

            const messageDiv = document.createElement('div');
            messageDiv.className = `flex items-start gap-4 max-w-3xl mx-auto ${isUser ? 'flex-row-reverse' : ''}`;
            messageDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full ${avatarBg} flex items-center justify-center text-white font-bold shrink-0 text-sm">${initial}</div>
                <div class="${bubbleBg} border rounded-2xl px-4 py-3 shadow-md max-w-[85%]">
                    <p class="text-sm leading-relaxed whitespace-pre-wrap">${content}</p>
                </div>
            `;
            chatFeed.appendChild(messageDiv);
            chatFeed.scrollTop = chatFeed.scrollHeight;
        }

        function appendLoadingIndicator() {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading-indicator';
            loadingDiv.className = 'flex items-start gap-4 max-w-3xl mx-auto';
            loadingDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold shrink-0 text-sm animate-pulse">A</div>
                <div class="bg-[#2f2f2f] border border-[#3c3d3e] rounded-2xl px-4 py-3 shadow-md">
                    <div class="flex items-center gap-1.5 py-1">
                        <span class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                        <span class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                        <span class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
                    </div>
                </div>
            `;
            chatFeed.appendChild(loadingDiv);
            chatFeed.scrollTop = chatFeed.scrollHeight;
        }

        function removeLoadingIndicator() {
            const indicator = document.getElementById('loading-indicator');
            if (indicator) indicator.remove();
        }

        function updateLogs(reasoning, toolUsed) {
            logFeed.innerHTML = `
                <div class="p-3 bg-[#262626] rounded-xl border border-[#3c3d3e] space-y-2">
                    <div class="text-indigo-400 font-semibold text-[10px] uppercase tracking-wider">Latest Action</div>
                    <div><span class="text-gray-500">Selected Tool:</span> <span class="text-green-400 font-bold">${toolUsed || 'None (Follow-up)'}</span></div>
                    <div class="text-gray-500 mt-2">Reasoning Trail:</div>
                    <div class="leading-relaxed text-gray-300 mt-1">${reasoning}</div>
                </div>
            ` + logFeed.innerHTML;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            // Prevent sending if no text query is provided
            if (!text && stagedFiles.length === 0) return;

            // Formulate user bubble string showing file attachments
            let displayMsg = text;
            if (stagedFiles.length > 0) {
                const fileListStr = stagedFiles.map(f => `📎 [${f.name}]`).join('\n');
                displayMsg = text ? `${fileListStr}\n\n${text}` : fileListStr;
            }

            appendMessage('user', displayMsg);
            userInput.value = '';
            appendLoadingIndicator();

            // Construct FormData payload
            const formData = new FormData();
            formData.append('query', text || "Summarize the attached document");
            formData.append('history', JSON.stringify(chatHistory));
            
            stagedFiles.forEach(file => {
                formData.append('files', file);
            });

            // Reset file states
            stagedFiles = [];
            renderFileChips();
            fileInput.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                removeLoadingIndicator();

                if (response.ok) {
                    appendMessage('assistant', data.output);
                    updateLogs(data.reasoning_trace, data.tool_used);
                    
                    chatHistory.push({ role: 'user', content: text || "Uploaded document analysis" });
                    chatHistory.push({ role: 'assistant', content: data.output });

                    if (chatHistory.length > 8) {
                        chatHistory.shift();
                        chatHistory.shift();
                    }
                } else {
                    appendMessage('assistant', `Error: ${data.detail || 'An unexpected error occurred.'}`);
                }
            } catch (err) {
                removeLoadingIndicator();
                appendMessage('assistant', `Connection error: ${err.message}`);
            }
        }
    </script>
</body>
</html>
